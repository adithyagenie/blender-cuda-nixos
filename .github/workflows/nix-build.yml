name: Nix Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        system: [x86_64-linux]
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - name: Restore Nix store from GitHub cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Install Cachix
        uses: cachix/cachix-action@v16
        with:
          name: adithyagenie
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build and push
        run: |
          set -euo pipefail

          paths_file="$(mktemp)"
          trap 'rm -f "$paths_file"' EXIT

          nix build .#blender-with-cuda .#blender-with-cuda-unstable \
            --print-out-paths \
            --no-link >"$paths_file"

          mapfile -t paths <"$paths_file"

          if [ "${#paths[@]}" -eq 0 ]; then
            echo "nix build did not print any output paths" >&2
            exit 1
          fi

          printf '%s\n' "${paths[@]}" | cachix push adithyagenie

          for path in "${paths[@]}"; do
            narinfo_url="https://adithyagenie.cachix.org/$(basename "$path" | cut -d- -f1).narinfo"

            for attempt in 1 2 3 4 5; do
              if curl -fsS "$narinfo_url" >/dev/null; then
                break
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Cached path is still unavailable from the public cache: $path" >&2
                exit 1
              fi

              sleep 15
            done
          done
