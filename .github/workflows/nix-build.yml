name: Nix Build

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        system: [x86_64-linux]
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - name: Install Cachix
        uses: cachix/cachix-action@v16
        with:
          name: adithyagenie
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build and push
        run: |
          set -euo pipefail

          paths_file="$(mktemp)"
          trap 'rm -f "$paths_file"' EXIT

          nix build .#blender-with-cuda .#blender-with-cuda-unstable \
            --print-out-paths \
            --no-link >"$paths_file"

          mapfile -t paths <"$paths_file"

          if [ "${#paths[@]}" -eq 0 ]; then
            echo "nix build did not print any output paths" >&2
            exit 1
          fi

          printf '%s\n' "${paths[@]}" | cachix push adithyagenie

          for path in "${paths[@]}"; do
            for attempt in 1 2 3 4 5; do
              if nix path-info --store https://adithyagenie.cachix.org "$path" >/dev/null; then
                break
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "Cached path is still unavailable from the public cache: $path" >&2
                exit 1
              fi

              sleep 15
            done
          done
